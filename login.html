<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Financiero Pro - Acceso</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="min-h-screen flex items-center justify-center bg-[#F8F6F2] px-6">

    <!-- Overlay de carga inicial -->
    <!-- Borra esto por completo -->
    <div id="loading-overlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-stone-700 mb-4"></div>
        <p class="text-xs font-bold uppercase tracking-widest text-stone-500">Conectando con el Sistema...</p>
    </div>

    <div class="w-full max-w-md bg-white p-8 rounded-xl-custom soft-shadow border border-stone-200">

        <!-- Cambiamos el form por un div para evitar recargas automáticas por errores de eventos -->
        <div id="login-form">
            <div class="text-center mb-8">
                <div class="w-12 h-12 bg-stone-800 rounded-xl flex items-center justify-center shadow-md mx-auto mb-4">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                </div>
                <h2 class="text-2xl font-light italic text-stone-800">Control <span
                        class="font-bold not-italic">Financiero</span></h2>
                <p class="text-xs text-stone-400 mt-1 uppercase tracking-wider font-bold">Acceso al Sistema</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label
                        class="text-[10px] font-bold uppercase tracking-wider text-stone-400 block mb-1">Usuario</label>
                    <input type="text" id="login-user" autocomplete="username" placeholder="Usuario"
                        class="w-full p-4 rounded-xl bg-gray-50 outline-none text-sm border border-transparent focus:border-stone-200">
                </div>
                <div>
                    <label
                        class="text-[10px] font-bold uppercase tracking-wider text-stone-400 block mb-1">Contraseña</label>
                    <div class="password-container" style="position: relative; width: 100%;">
                        <input type="password" id="login-pass" autocomplete="current-password" placeholder="Contraseña"
                            class="w-full p-4 rounded-xl bg-gray-50 outline-none text-sm border border-transparent focus:border-stone-200"
                            style="padding-right: 45px;">

                        <button type="button" id="btn-toggle-pass"
                            style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #6b7280; padding: 0; display: flex; align-items: center; z-index: 10;">
                            <!-- Tus SVGs del ojo van aquí igual -->
                        </button>
                    </div>
                </div>

                <p id="login-error" class="text-rose-500 text-xs font-semibold hidden text-center"></p>

                <!-- Botón normal con onclick directo para evitar cualquier recarga rara -->
                <button type="button" onclick="AuthModule.ejecutarLogin()"
                    class="w-full bg-stone-800 text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-stone-700 transition-colors cursor-pointer">
                    Ingresar
                </button>
            </div>
        </div>
    </div>

    <script src="js/ui.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/login.js" defer></script>
    <script src="js/app.js" defer></script>
</body>

</html>
